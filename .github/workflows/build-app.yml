name: Build Android App

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Supabase Build ID'
        required: true
        type: string
      config_json:
        description: 'JSON configuration for the app'
        required: true
        type: string

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ===== 1. CHECKOUT =====
      - name: Checkout repository
        uses: actions/checkout@v4

      # ===== 2. UPDATE BUILD STATUS TO 'building' =====
      - name: Update build status to building
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/builds?id=eq.${{ inputs.build_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "building", "github_run_id": ${{ github.run_id }}}'

      # ===== 3. SETUP JDK =====
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ===== 4. SETUP PYTHON =====
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ===== 5. INJECT CONFIGURATION =====
      - name: Inject app configuration
        run: |
          python scripts/inject_config.py '${{ inputs.config_json }}'

      # ===== 6. DECODE KEYSTORE =====
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      # ===== 7. SETUP GRADLE =====
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # ===== 8. MAKE GRADLEW EXECUTABLE =====
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ===== 9. BUILD RELEASE APK =====
      - name: Build Release APK
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      # ===== 10. BUILD RELEASE AAB =====
      - name: Build Release AAB
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      # ===== 11. EXTRACT APP NAME =====
      - name: Extract app name
        id: appname
        run: |
          APP_NAME=$(echo '${{ inputs.config_json }}' | python3 -c "import sys,json; print(json.load(sys.stdin).get('app_name','MyApp'))")
          SAFE_NAME=$(echo "$APP_NAME" | tr ' ' '_' | tr -cd '[:alnum:]_')
          echo "name=$SAFE_NAME" >> $GITHUB_OUTPUT

      # ===== 12. CREATE ZIP =====
      - name: Package APK and AAB into ZIP
        run: |
          mkdir -p output
          cp app/build/outputs/apk/release/app-release.apk output/app-release.apk
          cp app/build/outputs/bundle/release/app-release.aab output/app-release.aab
          cd output
          zip "WebToApp_Build_${{ steps.appname.outputs.name }}.zip" app-release.apk app-release.aab

      # ===== 13. UPLOAD ZIP TO SUPABASE STORAGE =====
      - name: Upload ZIP to Supabase Storage
        id: upload
        run: |
          ZIP_FILE="output/WebToApp_Build_${{ steps.appname.outputs.name }}.zip"
          STORAGE_PATH="builds/${{ inputs.build_id }}/WebToApp_Build_${{ steps.appname.outputs.name }}.zip"

          # Upload to Supabase Storage
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "${{ env.SUPABASE_URL }}/storage/v1/object/builds/${STORAGE_PATH}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/zip" \
            --data-binary @"$ZIP_FILE")

          echo "Upload HTTP code: $HTTP_CODE"
          echo "storage_path=${STORAGE_PATH}" >> $GITHUB_OUTPUT

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Upload failed with HTTP code: $HTTP_CODE"
            exit 1
          fi

      # ===== 14. UPDATE BUILD STATUS TO 'completed' =====
      - name: Update build status to completed
        if: success()
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/builds?id=eq.${{ inputs.build_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\": \"completed\", \"storage_path\": \"${{ steps.upload.outputs.storage_path }}\"}"

      # ===== 15. ON FAILURE =====
      - name: Update build status to failed
        if: failure()
        run: |
          curl -s -X PATCH \
            "${{ env.SUPABASE_URL }}/rest/v1/builds?id=eq.${{ inputs.build_id }}" \
            -H "apikey: ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ env.SUPABASE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"status": "failed", "error_logs": "Build failed. Check GitHub Actions run ${{ github.run_id }} for details."}'

      # ===== 16. UPLOAD ARTIFACTS (GitHub backup) =====
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "WebToApp_Build_${{ steps.appname.outputs.name }}"
          path: output/*.zip
          retention-days: 7
